name: Desktop Build and Release

on:
  pull_request:
  push:
    tags:
      - "*.*.*"
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CI: true
  CSC_IDENTITY_AUTO_DISCOVERY: false

jobs:
  validate:
    name: Validate project
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint project
        run: bun run lint

      - name: Build application
        run: bun run build

  validate-release-tag:
    name: Validate release tag
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate Epoch SemVer tag
        id: tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must use Epoch SemVer format: <epoch-major>.minor.patch or v<epoch-major>.minor.patch"
            exit 1
          fi

          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "Tag version ($VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  package:
    name: ${{ matrix.platform.name }}
    needs: validate
    runs-on: ${{ matrix.platform.runner }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS arm64
            runner: macos-15
            build_args: --mac dmg --arm64 --publish never
            artifact_pattern: release/*.dmg
            artifact_name: term-macos-arm64
          - name: macOS x64
            runner: macos-15-intel
            build_args: --mac dmg --x64 --publish never
            artifact_pattern: release/*.dmg
            artifact_name: term-macos-x64
          - name: Windows x64
            runner: windows-2025
            build_args: --win nsis --x64 --publish never
            artifact_pattern: release/*.exe
            artifact_name: term-windows-x64
          - name: Linux x64
            runner: ubuntu-24.04
            build_args: --linux AppImage --x64 --publish never
            artifact_pattern: release/*.AppImage
            artifact_name: term-linux-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build application
        run: bun run build

      - name: Validate Epoch SemVer tag
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must use Epoch SemVer format: <epoch-major>.minor.patch or v<epoch-major>.minor.patch"
            exit 1
          fi

          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "Tag version ($VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Package installer
        run: |
          rm -rf release
          mkdir -p release
          bunx electron-builder --config electron-builder.yml ${{ matrix.platform.build_args }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: ${{ matrix.platform.artifact_pattern }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - validate-release-tag
      - package
    runs-on: ubuntu-24.04
    steps:
      - name: Download packaged installers
        uses: actions/download-artifact@v4
        with:
          pattern: term-*
          merge-multiple: true
          path: dist-artifacts

      - name: Ensure GitHub CLI is available
        shell: bash
        run: |
          if command -v gh >/dev/null 2>&1; then
            gh --version
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install --yes gh

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || gh release create "$TAG_NAME" --verify-tag --generate-notes
          shopt -s nullglob
          files=( dist-artifacts/* )
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files found to upload."
            exit 1
          fi
          gh release upload "$TAG_NAME" "${files[@]}" --clobber
